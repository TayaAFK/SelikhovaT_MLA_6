version: '3.8'

services:
  app:
    build: .
    ports:
      - "9005:8005"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/students_db
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=students_db
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
